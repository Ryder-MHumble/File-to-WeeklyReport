<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-04">
  <div class="dash-shell">
    <header class="dash-hero" id="hero">
      <div>
        <p class="dash-eyebrow">WEEKLY COMMAND CENTER</p>
        <h1 class="dash-title" id="hero-title">周报</h1>
        <p class="dash-sub" id="hero-sub">内部资料</p>
      </div>
      <div class="dash-clock">
        <p id="hero-issued">ISSUED</p>
        <p id="hero-period">PERIOD</p>
      </div>
    </header>

    <section class="dash-kpi" id="kpi-strip"></section>

    <div class="dash-body">
      <aside class="dash-side">
        <div class="dash-side-block">
          <p class="dash-side-title">导航</p>
          <button type="button" data-target="overview">本周要览</button>
          <button type="button" data-target="work">重点工作</button>
          <button type="button" data-target="data">数据看板</button>
          <button type="button" data-target="issue">签发信息</button>
        </div>
        <div class="dash-side-block" id="summary-card"></div>
        <div class="dash-side-actions">
          <button type="button" id="print-btn">打印</button>
          <button type="button" id="export-btn">导出 HTML</button>
        </div>
      </aside>

      <main class="dash-content" id="content-root">
        <section class="dash-section" id="overview" data-section="overview">
          <div class="dash-section-head">
            <p>Overview</p>
            <h2>本周要览</h2>
          </div>
          <div class="dash-timeline" id="overview-list"></div>
        </section>

        <section class="dash-section" id="work" data-section="work">
          <div class="dash-section-head">
            <p>Work Streams</p>
            <h2>重点工作</h2>
          </div>
          <div class="dash-tabs" id="work-tabs"></div>
          <div class="dash-work-grid" id="work-panel"></div>
        </section>

        <section class="dash-section" id="data" data-section="data">
          <div class="dash-section-head">
            <p>Data</p>
            <h2>数据看板</h2>
          </div>
          <div class="dash-data-grid">
            <article class="dash-data-card" id="data-summary"></article>
            <article class="dash-data-card">
              <h3>对外合作推进度</h3>
              <div id="data-cooperation"></div>
            </article>
            <article class="dash-data-card">
              <h3>项目评审结果</h3>
              <div id="data-defense"></div>
            </article>
            <article class="dash-data-card">
              <h3>关键指标</h3>
              <div class="dash-metrics" id="data-metrics"></div>
            </article>
          </div>
        </section>

        <section class="dash-section" id="issue" data-section="issue">
          <div class="dash-section-head">
            <p>Distribution</p>
            <h2>签发信息</h2>
          </div>
          <div class="dash-issue" id="issue-footer"></div>
        </section>
      </main>
    </div>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

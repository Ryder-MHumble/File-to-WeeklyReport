<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-05">
  <div class="masthead">
    <div class="mh-brand">
      <div class="mh-logo">报</div>
      <div class="mh-name">科研协同中心</div>
    </div>
    <div class="mh-ticker">
      <div class="ticker-items">
        <div class="ticker-item">重点课题按期率 <span class="ticker-val">94%</span></div>
        <div class="ticker-dot"></div>
        <div class="ticker-item">阶段评审事项 <span class="ticker-val">11项</span></div>
      </div>
    </div>
    <div class="mh-right">
      <div class="mh-date">2026·04·14</div>
      <div class="mh-issue">第 01 期</div>
    </div>
  </div>

  <div class="super-hero fade-up">
    <div class="sh-main">
      <div class="sh-bg-word">WEEKLY</div>
      <div class="sh-eyebrow">本周要览</div>
      <div class="sh-headline">课题与平台<br />双线推进</div>
      <div class="sh-deck">当前为中性 mock 占位内容，页面加载后将按模板数据自动渲染完整周报。</div>
    </div>
    <div class="sh-kpi-col">
      <div class="sh-kpi-item">
        <div class="ski-label">关键指标</div>
        <div class="ski-row"><div class="ski-num" style="color:var(--gold)">94</div><div class="ski-unit">%</div></div>
        <div class="ski-desc">里程碑按期率</div>
      </div>
    </div>
  </div>

  <div class="body-layout"></div>

  <div class="bottom-strip"></div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-03">
  <div class="ink-shell">
    <header class="ink-cover" id="cover">
      <div class="ink-cover-inner">
        <p class="ink-cover-en" id="cover-en">Weekly Report</p>
        <h1 class="ink-cover-title" id="cover-title">周报</h1>
        <p class="ink-cover-sub" id="cover-sub">第一期</p>
        <div class="ink-cover-meta" id="cover-meta"></div>
        <div class="ink-cover-stats" id="cover-stats"></div>
      </div>
    </header>

    <div class="ink-nav">
      <div class="ink-nav-brand" id="nav-brand">周报</div>
      <nav class="ink-nav-links">
        <a href="#overview" data-nav-link="overview">本周要览</a>
        <a href="#work" data-nav-link="work">重点工作</a>
        <a href="#data" data-nav-link="data">数据看板</a>
        <a href="#issue" data-nav-link="issue">签发信息</a>
      </nav>
      <div class="ink-nav-actions">
        <button type="button" id="print-btn">打印</button>
        <button type="button" id="export-btn">导出 HTML</button>
      </div>
    </div>

    <main class="ink-main">
      <section class="ink-section" id="overview" data-section="overview">
        <div class="ink-section-head">
          <p class="ink-section-en">Scroll Highlights</p>
          <h2>本周要览</h2>
        </div>
        <div class="ink-overview-list" id="overview-list"></div>
      </section>

      <section class="ink-section" id="work" data-section="work">
        <div class="ink-section-head">
          <p class="ink-section-en">Key Work Progress</p>
          <h2>重点工作</h2>
        </div>
        <div class="ink-work-tabs" id="work-tabs"></div>
        <div class="ink-work-grid" id="work-panel"></div>
      </section>

      <section class="ink-section" id="data" data-section="data">
        <div class="ink-section-head">
          <p class="ink-section-en">Data Dashboard</p>
          <h2>数据看板</h2>
        </div>
        <div class="ink-metric-wall" id="data-metrics"></div>
        <div class="ink-data-grid">
          <article class="ink-data-card">
            <h3>项目评审结果</h3>
            <div id="data-defense"></div>
          </article>
          <article class="ink-data-card">
            <h3>推进进度</h3>
            <div id="data-progress"></div>
          </article>
        </div>
      </section>

      <section class="ink-section" id="issue" data-section="issue">
        <div class="ink-section-head">
          <p class="ink-section-en">Distribution</p>
          <h2>签发信息</h2>
        </div>
        <div class="ink-issue" id="issue-footer"></div>
      </section>
    </main>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

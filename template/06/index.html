<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-06">
  <div class="paper-wrap">
    <div class="journal-header">
      <div class="jh-left">
        <div class="journal-name">Research Progress Journal · Internal Bulletin</div>
        <div class="journal-title">科研协同中心工作周报</div>
        <div class="journal-sub">Weekly Research Progress Summary</div>
      </div>
      <div class="jh-right">
        <div class="issue-box">
          <div class="issue-vol">Vol. 2026 · Issue</div>
          <div class="issue-num">No. 01</div>
          <div class="issue-date">April 14, 2026</div>
        </div>
      </div>
    </div>

    <div class="meta-strip">
      <div class="meta-authors">报告期间：<span>2026年4月第2周</span> &nbsp;|&nbsp; 发布：<span>科研协同与成果转化办公室</span></div>
      <div class="meta-tags">
        <span class="meta-tag">执行推进</span>
        <span class="meta-tag">协同联动</span>
        <span class="meta-tag">风险闭环</span>
      </div>
    </div>

    <div class="abstract col-reveal">
      <div class="abstract-label">摘要 ABSTRACT</div>
      <div class="abstract-body">
        <div class="abstract-text">当前为中性 mock 占位内容，页面加载后将按模板数据自动渲染完整周报。</div>
      </div>
    </div>

    <div class="kpi-inline col-reveal"></div>

    <div class="body-cols"></div>

    <div class="footnote-bar col-reveal"></div>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

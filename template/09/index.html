<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-09">
<div class="mast">
  <div class="mast-left">
    <div class="mast-logo" id="sw-logo">报</div>
    <div class="mast-title-wrap">
      <div class="mast-pub" id="sw-pub">Internal Bulletin · 内部资料</div>
      <div class="mast-name" id="sw-name">周报</div>
    </div>
  </div>
  <div class="mast-center"><div class="mast-ticker" id="sw-ticker"></div></div>
  <div class="mast-right">
    <div class="mr-issue" id="sw-issue">VOL</div>
    <div class="mr-date" id="sw-date">DATE</div>
  </div>
</div>

<div class="kpi-band" id="sw-kpi-band"></div>

<div class="page">
  <div class="sec">
    <div class="sec-num"><div class="sn-ord">01</div><div class="sn-label">本周要览</div></div>
    <div class="sec-body">
      <div class="sec-headline">本周<span class="accent">要览</span><br>HIGHLIGHTS</div>
      <div class="ev-list" id="sw-overview-list"></div>
    </div>
  </div>

  <div class="sec rev">
    <div class="sec-num"><div class="sn-ord">02</div><div class="sn-label">内部协同</div></div>
    <div class="sec-body">
      <div class="sec-headline">内部<span class="accent">协同</span><br>SYNC</div>
      <div class="two-col" id="sw-internal-grid"></div>
    </div>
  </div>

  <div class="sec rev">
    <div class="sec-num"><div class="sn-ord">03</div><div class="sn-label">对外合作</div></div>
    <div class="sec-body">
      <div class="sec-headline">对外<span class="accent">合作</span><br>PARTNERS</div>
      <div class="two-col" id="sw-cooperation-grid"></div>
    </div>
  </div>

  <div class="sec rev">
    <div class="sec-num"><div class="sn-ord">04</div><div class="sn-label">数据看板</div></div>
    <div class="sec-body">
      <div class="sec-headline">数据<span class="accent">看板</span><br>METRICS</div>
      <div style="margin-bottom:16px"><div class="numwall" id="sw-numwall"></div></div>
      <div class="data-grid">
        <div class="dg-box">
          <div class="dg-title">对外合作推进进度</div>
          <div class="hbar-list" id="sw-coop-bars"></div>
        </div>
        <div class="dg-box">
          <div class="dg-title" id="sw-defense-title">项目评审结果</div>
          <table class="answer-table">
            <thead><tr><th>结果类型</th><th>数量</th><th>比例</th></tr></thead>
            <tbody id="sw-defense-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="sw-footer"></div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

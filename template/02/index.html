<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-02">
  <div class="mag-shell">
    <header class="cover" id="cover">
      <div class="cover-frame"></div>
      <div class="cover-masthead">
        <p class="cover-pretitle" id="cover-pretitle">内部周刊</p>
        <p class="cover-issue" id="cover-issue">Vol.01</p>
        <h1 class="cover-brand">WEEKLY MAGAZINE</h1>
        <p class="cover-title" id="cover-title">本周重点摘要</p>
      </div>
      <div class="cover-grid">
        <aside class="cover-column cover-column-left">
          <h2 class="cover-column-title">本期数据</h2>
          <div id="cover-stats"></div>
        </aside>
        <section class="cover-column cover-column-main">
          <h2 class="cover-headline" id="cover-headline">重点标题</h2>
          <div class="cover-decks" id="cover-decks"></div>
          <p class="cover-meta" id="cover-meta">报告周期</p>
        </section>
        <aside class="cover-column cover-column-right">
          <h2 class="cover-column-title">栏目目录</h2>
          <ol class="cover-toc" id="cover-toc"></ol>
        </aside>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-brand" id="toolbar-brand">周报</div>
      <nav class="toolbar-nav">
        <a href="#overview" data-nav-link="overview">本周要览</a>
        <a href="#work" data-nav-link="work">重点工作</a>
        <a href="#data" data-nav-link="data">数据看板</a>
        <a href="#issue" data-nav-link="issue">签发信息</a>
      </nav>
      <div class="toolbar-actions">
        <button type="button" id="print-btn">打印</button>
        <button type="button" id="export-btn">导出 HTML</button>
      </div>
    </div>

    <main class="main-content">
      <section class="section" id="overview" data-section="overview">
        <div class="section-head">
          <p class="section-en">Weekly Highlights</p>
          <h2>本周要览</h2>
        </div>
        <div class="overview-grid" id="overview-list"></div>
      </section>

      <section class="section" id="work" data-section="work">
        <div class="section-head">
          <p class="section-en">Key Progress</p>
          <h2>重点工作</h2>
        </div>
        <div class="work-tabs" id="work-tabs"></div>
        <div class="work-grid" id="work-panel"></div>
      </section>

      <section class="section" id="data" data-section="data">
        <div class="section-head">
          <p class="section-en">Data Dashboard</p>
          <h2>数据看板</h2>
        </div>
        <div class="metric-wall" id="data-metrics"></div>
        <div class="chart-grid">
          <article class="chart-card">
            <h3>项目评审结果</h3>
            <div id="data-defense"></div>
          </article>
          <article class="chart-card">
            <h3>对外合作推进进度</h3>
            <div id="data-cooperation"></div>
          </article>
        </div>
      </section>

      <section class="section" id="issue" data-section="issue">
        <div class="section-head">
          <p class="section-en">Distribution</p>
          <h2>签发信息</h2>
        </div>
        <div class="issue-card" id="issue-footer"></div>
      </section>
    </main>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>file2web 模板预览</title>
  <style id="template-inline-style">__TEMPLATE_STYLE__</style>
</head>
<body data-template-id="template-08">
  <div class="split-shell">
    <aside class="split-side">
      <div class="split-head">
        <p class="split-eyebrow">Split Magazine</p>
        <h1 class="split-title" id="left-title">工作周报</h1>
        <p class="split-issue" id="left-issue">第 01 期</p>
      </div>
      <div class="split-stats" id="left-stats"></div>
      <nav class="split-nav" id="left-nav"></nav>
      <div class="split-foot" id="left-foot"></div>
      <div class="split-actions">
        <button type="button" id="print-btn">打印</button>
        <button type="button" id="export-btn">导出 HTML</button>
      </div>
    </aside>

    <main class="split-main">
      <section class="split-section" id="overview" data-section="overview">
        <div class="split-headline">
          <p>Weekly Highlights</p>
          <h2>本周要览</h2>
        </div>
        <div class="split-overview" id="overview-list"></div>
      </section>

      <section class="split-section" id="internal" data-section="internal">
        <div class="split-headline">
          <p>Internal Work</p>
          <h2>内部协同</h2>
        </div>
        <div class="split-work-grid" id="wk-grid"></div>
      </section>

      <section class="split-section" id="cooperation" data-section="cooperation">
        <div class="split-headline">
          <p>External Partners</p>
          <h2>对外合作</h2>
        </div>
        <div class="split-work-grid" id="co-grid"></div>
      </section>

      <section class="split-section" id="visit" data-section="visit">
        <div class="split-headline">
          <p>Academic Exchange</p>
          <h2>交流互访</h2>
        </div>
        <div class="split-work-grid" id="vi-grid"></div>
      </section>

      <section class="split-section" id="system" data-section="system">
        <div class="split-headline">
          <p>System Building</p>
          <h2>体系建设</h2>
        </div>
        <div class="split-work-grid" id="sy-grid"></div>
      </section>

      <section class="split-section" id="data" data-section="data">
        <div class="split-headline">
          <p>Data Dashboard</p>
          <h2>数据看板</h2>
        </div>
        <div class="split-metrics" id="data-metrics"></div>
        <div class="split-data-grid">
          <article class="split-card">
            <h3>对外合作推进度</h3>
            <div id="data-cooperation"></div>
          </article>
          <article class="split-card">
            <h3>项目评审结果</h3>
            <div id="data-defense"></div>
          </article>
        </div>
      </section>

      <section class="split-section" id="issue" data-section="issue">
        <div class="split-headline">
          <p>Distribution</p>
          <h2>签发信息</h2>
        </div>
        <div class="split-issue-card" id="issue-footer"></div>
      </section>
    </main>
  </div>

  <script id="template-data" type="application/json">__TEMPLATE_DATA__</script>
  <script id="template-script" type="application/json">__TEMPLATE_SCRIPT__</script>
  <script>
    (() => {
      const styleNode = document.getElementById('template-inline-style')
      const dataNode = document.getElementById('template-data')
      const scriptNode = document.getElementById('template-script')
      const isLivePreview =
        styleNode?.textContent.includes('__TEMPLATE_STYLE__') ||
        dataNode?.textContent.includes('__TEMPLATE_DATA__') ||
        scriptNode?.textContent.includes('__TEMPLATE_SCRIPT__')

      if (isLivePreview) {
        const loader = document.createElement('script')
        loader.src = '../_runtime/live-preview.js'
        loader.dataset.templateId = document.body.dataset.templateId || ''
        loader.dataset.styleHref = './style.css'
        loader.dataset.scriptSrc = './app.js'
        document.body.appendChild(loader)
        return
      }

      const runtimeScript = document.createElement('script')
      runtimeScript.textContent = scriptNode?.textContent || ''
      document.body.appendChild(runtimeScript)
    })()
  </script>
</body>
</html>
